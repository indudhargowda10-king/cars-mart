services:
  - type: web
    name: cars-mart-backend
    env: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cars-mart-db
          property: connectionString
      - key: NODE_ENV
        value: production

databases:
  - name: cars-mart-db
    databaseName: carsmart
    user: carsmartuser
